# Continuity Ledger lane manifest.
#
# This file is the repository's authoritative declaration of its durable
# execution containers. It holds definitions, owner control state, and pointers
# to authoritative work. It never stores run history, derived health,
# automation cadence, or a duplicate backlog.
#
# Numbered lanes are Progress. Lettered lanes are Stewardship. Discovery is
# lane-less and names its subject, read scope, output, recipient, deduplication
# rule, escalation rule, and completion condition in the Run Plan.
#
# Note on vocabulary: "lane" here means an execution container. The CL-001
# evidence and source-intake lanes under evidence/ and tests/ are packet
# evidence categories owned by this repository's research contract. The two are
# unrelated and must not be reconciled with one another.

lane_contract_version: "1.0"
manifest_revision: 2

owner:
  owner_id: continuity-ledger
  display_name: Continuity Ledger
  scope_type: repository
  charter_ref: governance/CHARTER.md
  governance_refs:
    - AGENTS.md

  # The charter sits above the lane structure. This block is a POINTER to
  # governance/CHARTER.md, never a source. Where the two differ, the charter is
  # right by construction and this file is corrected against it (Canon precedence
  # rule, CHARTER.md > Source Sovereignty > Provenance Correction).
  #
  # The North Star is ONE statement with two components. The blockbuster
  # component is what Lane 1 forces or falsifies. The agent-capability component
  # is not a lane, never commissions an experiment, and only explains the choice
  # of target and constrains method.
  charter_north_star_blockbuster: >-
    Agents escape class-relative limits by constructing new binding constraints
    rather than by removing old ones, and the enforcement substrate determines
    which constraints can be made binding. The reachable capability space of a
    system is therefore set by its enforcement physics, not by its intentions.
    (governance/CHARTER.md, "North Star" > "Blockbuster component".) Lane 1 is
    its primary operational expression by way of the Nearer Guiding Hypothesis,
    which is the falsifiable form and which adds the load-bearing clause: the
    binding constraint class varies with S0 at fixed evaluator, and does not vary
    with the evaluator at fixed S0.

  charter_north_star_agent_capability: >-
    Whether research agents can hold a declared frame fixed while exactly one
    field sweeps, and route a recognized defect out of the local run.
    (governance/CHARTER.md, "North Star" > "Agent-capability component".) This is
    NOT a lane and may not commission work. It does two things: it explains why
    this repository chases this blockbuster (the claim quantifies over S0, a
    declared field, so it is uniquely fakeable by re-choosing the substrate), and
    it constrains how every Lane 1 experiment runs (CHARTER.md, "Frame
    Discipline"). Neither component is evidence for the other; an artifact that
    couples them fails the typing gate. Present evidence is against the
    capability: four independent runs recognized CL-001's fatal defect, four
    recorded it correctly, zero escalated.

  charter_horizon: >-
    Evolutionary agency escape, the prior North Star, is preserved verbatim in
    hypotheses/HORIZON.md and reclassified horizon. Demoted 2026-07-16 for naming
    no mechanism, not for difficulty. The blockbuster component is that claim with
    the mechanism supplied. It may not be restored on the grounds that it is
    important.
  authoritative_state_refs:
    - README.md
    - hypotheses/FOUNDING-HYPOTHESES.md
    - interfaces/continuity-ledger-transaction-v0.1.md
    - packets
    - evidence
    - results

lanes:
  - id: "1"
    label: "Lane 1"
    ordinal: 1
    kind: progress
    title: Constraint-bought capability, substrate-bounded
    slug: CONSTRAINT-BOUGHT-CAPABILITY
    north_star: true
    purpose: >-
      Force or falsify the charter's blockbuster component, by way of its Nearer
      Guiding Hypothesis: that at a declared frame a typed continuity ledger
      distinguishes a constructed binding constraint from ordinary conversion,
      fixed-family disclosure, and observer-side relabeling, and that the class of
      constraints it finds binding varies with S0 at fixed evaluator and does not
      vary with the evaluator at fixed S0. Capability is bought with constraint;
      the substrate sets which constraints are purchasable. This is one hypothesis
      and one ten-gate experiment; it is not divisible into a continuity half and
      an escape half.
    purpose_type: north_star
    relation_to_lane_1: primary_operational_expression
    method_constraints_ref: governance/CHARTER.md#frame-discipline
    method_constraints_note: >-
      Frame Discipline is binding on every run in this lane and is derived from
      the North Star's agent-capability component, not from a lane of its own.
      A run that violates it is inadmissible regardless of its result.
    falsification_refs:
      - governance/CHARTER.md#nearer-guiding-hypothesis
    research_sequence:
      - CL-001 the interval sweep (dollar / Bitcoin at one declared frame, T the
        only free field, evaluator index swept; two preregistered outcomes, both
        lethal, no third branch)
      - CL-002 transfer and composition
      - CL-003 no-go escape accounting
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that
        directly advance or test the named Lane 1 purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that
        directly advance or test the named Lane 1 purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 2
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: "Joe direct chat, 2026-07-16 North Star amendment"
      reason: >-
        Lane 1 re-pointed at the amended blockbuster component. The prior purpose
        operationalized a Nearer Guiding Hypothesis whose North Star named no
        mechanism and whose case pair had no common frame.
    provenance:
      revision: 2
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "2"
    label: "Lane 2"
    ordinal: 2
    kind: progress
    title: Ledger hardening
    slug: LEDGER-HARDENING
    north_star: false
    purpose: >-
      Harden what Lane 1 establishes: sharpen the charter's core distinctions,
      maintain the casebook and literature map, strengthen absorber and matched-
      null discipline, keep results reproducible, and mature publication-ready
      byproducts. Hardening may not outrun Lane 1's evidence and may not promote
      a claim Lane 1 has not established.
    purpose_type: supporting_progress
    relation_to_lane_1: "supports:ledger force-or-falsify"
    lease_required: true
    lease_note: >-
      Scheduling lead for this lane requires a recorded lease under the
      North-Star firewall: relation to Lane 1, legitimate reason, authority,
      start, exit criterion or expiry, return target, and closeout evidence.
      Retreat from a hard North Star into tractable hardening byproducts is the
      named failure mode this brake exists to stop.
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "3"
    label: "Lane 3"
    ordinal: 3
    kind: progress
    title: Transduction atlas
    north_star: false
    purpose: >-
      Map transductions across domains and extract generalizable structures,
      shapes, and comparative patterns.
    purpose_type: independent_progress
    relation_to_lane_1: independent_progress
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: gated
      authority_ref: AGENTS.md
      gate_reason: >-
        AGENTS.md: "Do not generalize from the memorable pair before the
        controls pass." Atlas construction requires a corpus of resolved
        transductions. CL-001 is the first and is unresolved, so generalizing
        work has no admissible input yet. This gate encodes existing ratified
        canon; it does not narrow the lane's purpose.
      admissible_before_release:
        - exploration-grade candidate gathering
        - null candidates and absorber inventories
        - negative, non-composable, and domain-specific results
        - open-field registers naming what evidence would close them
      inadmissible_before_release:
        - shared-structure or cross-case generalization claims
        - atlas synthesis or comparative-pattern extraction
        - promotion of any candidate to repo-owned structure
      release_condition: >-
        CL-001 returns SHARED_STRUCTURE, NARROWER_STRUCTURE, or KILL. The
        verdict also re-decides this lane's scope; KILL does not automatically
        retire the lane, but its purpose returns to Joe for a governed
        decision.
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "A"
    label: "Lane A"
    letter: A
    kind: stewardship
    title: Continuity Ledger stewardship
    north_star: false
    purpose: >-
      Keep Continuity Ledger viable and trustworthy through integrated
      coordination, control, audit, intelligence/adaptation, policy/identity,
      and escalation.
    purpose_type: integrated_stewardship
    relation_to_lane_1: stewardship_of_owner
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    stewardship_obligations:
      - coordination
      - control
      - audit
      - intelligence_adaptation
      - policy_identity
      - escalation
    authoritative_work_refs:
      - README.md
      - governance/CHARTER.md
      - AGENTS.md
    durable_outputs:
      - >-
        Governance corrections, reconciliations, integrity records, adaptation
        proposals, and escalations that keep the owner viable.
    eligible_outputs:
      - >-
        Governance corrections, reconciliations, integrity records, adaptation
        proposals, and escalations that keep the owner viable.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
