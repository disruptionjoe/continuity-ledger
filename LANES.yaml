    label: "Lane 2"
    ordinal: 2
    kind: progress
    title: Evolutionary function and agency escape
    north_star: false
    purpose: >-
      Explain whether continuity-supporting transductions enable divergent
      evolutionary exploration and agency escape from class-relative no-goes.
    purpose_type: independent_progress
    relation_to_lane_1: independent_progress
    environment: >-
