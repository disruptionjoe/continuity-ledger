# Continuity Ledger lane manifest.
#
# This file is the repository's authoritative declaration of its durable
# execution containers. It holds definitions, owner control state, and pointers
# to authoritative work. It never stores run history, derived health,
# automation cadence, or a duplicate backlog.
#
# Numbered lanes are Progress. Lettered lanes are Stewardship. Discovery is
# lane-less and names its subject, read scope, output, recipient, deduplication
# rule, escalation rule, and completion condition in the Run Plan.
#
# Note on vocabulary: "lane" here means an execution container. The CL-001
# evidence and source-intake lanes under evidence/ and tests/ are packet
# evidence categories owned by this repository's research contract. The two are
# unrelated and must not be reconciled with one another.

lane_contract_version: "1.0"
manifest_revision: 1

owner:
  owner_id: continuity-ledger
  display_name: Continuity Ledger
  scope_type: repository
  charter_ref: governance/CHARTER.md
  governance_refs:
    - AGENTS.md

  # The charter sits above the lane structure. No lane is identical to the
  # Audacious North Star, and marking one `north_star: true` does not make it so.
  charter_north_star: >-
    Develop and force-or-falsify a theory of evolutionary agency escape
    (governance/CHARTER.md, "Audacious North Star"). The charter calls this the
    highest-ceiling target, not a premise, so it is not directly workable as a
    lane. Lane 1 is its primary operational expression by way of the charter's
    Nearer Guiding Hypothesis, which is the falsifiable object and which
    explicitly bundles continuity witnesses, generated agency, class-relative
    no-goes, escape moves, and recursive feedback into one hypothesis tested by
    one ten-gate experiment. Any lane boundary drawn between continuity and
    escape cuts that experiment in half and must be treated as a defect.

  # CL-H6 is charter-owned and is not exported. It is a lens on how the work is
  # done, never a substitute for what the work must produce.
  agent_capability_lens: >-
    CL-H6 Agentic Discovery Advantage (hypotheses/FOUNDING-HYPOTHESES.md). The
    charter owns this claim in three places: "Agentic Research Claim", "What
    This Repository Owns", and "Success Standard". It is the agent-capability
    evaluation lens for this repository. It is not a lane, not a replacement
    North Star, and not ai-epistemology's. Its own stated null is that more text
    and persona variety create only synthetic novelty.
  authoritative_state_refs:
    - README.md
    - hypotheses/FOUNDING-HYPOTHESES.md
    - interfaces/continuity-ledger-transaction-v0.1.md
    - packets
    - evidence
    - results

lanes:
  - id: "1"
    label: "Lane 1"
    ordinal: 1
    kind: progress
    title: Ledger force-or-falsify
    slug: LEDGER-FORCE-OR-FALSIFY
    north_star: true
    purpose: >-
      Force or falsify the charter's Nearer Guiding Hypothesis: that a
      nontrivial family of cross-domain systems admits a typed continuity
      ledger distinguishing agency-generating transduction from ordinary
      conversion, fixed-family disclosure, and observer-side relabeling, by
      explicitly tracking source and target regimes, continuity witnesses,
      losses, boundary imports, generated agency, class-relative no-goes,
      escape moves, and recursive feedback. This is one hypothesis and one
      ten-gate experiment; it is not divisible into a continuity half and an
      escape half.
    purpose_type: north_star
    relation_to_lane_1: primary_operational_expression
    falsification_refs:
      - governance/CHARTER.md#nearer-guiding-hypothesis
    research_sequence:
      - CL-001 pair and null
      - CL-002 transfer and composition
      - CL-003 no-go escape accounting
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that
        directly advance or test the named Lane 1 purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that
        directly advance or test the named Lane 1 purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "2"
    label: "Lane 2"
    ordinal: 2
    kind: progress
    title: Ledger hardening
    slug: LEDGER-HARDENING
    north_star: false
    purpose: >-
      Harden what Lane 1 establishes: sharpen the charter's core distinctions,
      maintain the casebook and literature map, strengthen absorber and matched-
      null discipline, keep results reproducible, and mature publication-ready
      byproducts. Hardening may not outrun Lane 1's evidence and may not promote
      a claim Lane 1 has not established.
    purpose_type: supporting_progress
    relation_to_lane_1: "supports:ledger force-or-falsify"
    lease_required: true
    lease_note: >-
      Scheduling lead for this lane requires a recorded lease under the
      North-Star firewall: relation to Lane 1, legitimate reason, authority,
      start, exit criterion or expiry, return target, and closeout evidence.
      Retreat from a hard North Star into tractable hardening byproducts is the
      named failure mode this brake exists to stop.
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "3"
    label: "Lane 3"
    ordinal: 3
    kind: progress
    title: Transduction atlas
    north_star: false
    purpose: >-
      Map transductions across domains and extract generalizable structures,
      shapes, and comparative patterns.
    purpose_type: independent_progress
    relation_to_lane_1: independent_progress
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: gated
      authority_ref: AGENTS.md
      gate_reason: >-
        AGENTS.md: "Do not generalize from the memorable pair before the
        controls pass." Atlas construction requires a corpus of resolved
        transductions. CL-001 is the first and is unresolved, so generalizing
        work has no admissible input yet. This gate encodes existing ratified
        canon; it does not narrow the lane's purpose.
      admissible_before_release:
        - exploration-grade candidate gathering
        - null candidates and absorber inventories
        - negative, non-composable, and domain-specific results
        - open-field registers naming what evidence would close them
      inadmissible_before_release:
        - shared-structure or cross-case generalization claims
        - atlas synthesis or comparative-pattern extraction
        - promotion of any candidate to repo-owned structure
      release_condition: >-
        CL-001 returns SHARED_STRUCTURE, NARROWER_STRUCTURE, or KILL. The
        verdict also re-decides this lane's scope; KILL does not automatically
        retire the lane, but its purpose returns to Joe for a governed
        decision.
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    authoritative_work_refs:
      - README.md
      - hypotheses/FOUNDING-HYPOTHESES.md
      - interfaces/continuity-ledger-transaction-v0.1.md
      - packets
      - evidence
      - results
    durable_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    eligible_outputs:
      - >-
        Owner-governed artifacts, decisions, and state transitions that advance
        the named independent Progress purpose.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

  - id: "A"
    label: "Lane A"
    letter: A
    kind: stewardship
    title: Continuity Ledger stewardship
    north_star: false
    purpose: >-
      Keep Continuity Ledger viable and trustworthy through integrated
      coordination, control, audit, intelligence/adaptation, policy/identity,
      and escalation.
    purpose_type: integrated_stewardship
    relation_to_lane_1: stewardship_of_owner
    environment: >-
      The owner's governed repository, its declared operating interfaces, and
      its authoritative work surfaces.
    beneficiaries:
      - Joe
      - the owner's declared users
      - authorized downstream consumers
    admission:
      posture: governed
      authority_ref: AGENTS.md
    execution_posture: automation_eligible
    health_profile: run_observed
    directed_flow: null
    stewardship_obligations:
      - coordination
      - control
      - audit
      - intelligence_adaptation
      - policy_identity
      - escalation
    authoritative_work_refs:
      - README.md
      - governance/CHARTER.md
      - AGENTS.md
      - steward/README.md
    durable_outputs:
      - >-
        Governance corrections, reconciliations, integrity records, adaptation
        proposals, and escalations that keep the owner viable.
    eligible_outputs:
      - >-
        Governance corrections, reconciliations, integrity records, adaptation
        proposals, and escalations that keep the owner viable.
    forbidden_outputs:
      - another owner's canon or authoritative state
      - automation enrollment, activation, cadence, trigger, or scheduler state
      - an external action without exact direct-chat authorization
      - >-
        a change to the North Star, an accepted scientific claim, or an altered
        source verdict
    control:
      state: active
      in_flight_policy: continue_current
      control_revision: 1
      scheduling_preference: normal
      changed_at: "2026-07-16T00:00:00-05:00"
      changed_by: "Joe direct chat, 2026-07-16"
      authority_ref: Joe-approved WI-078 fleet target map
      reason: Initial first-class Lane ratification
    provenance:
      revision: 1
      approved_at: "2026-07-16T00:00:00-05:00"
      approved_by: "Joe direct chat, 2026-07-16"

special_rules:
  - >-
    Generic agent-method learning routes to ai-epistemology. CL-H6 does not.
    CL-H6 Agentic Discovery Advantage is charter-owned in three places and is
    the agent-capability evaluation lens declared in this manifest's owner
    block. It is neither exported nor promoted to a fourth lane. An earlier
    revision of this manifest exported it; that contradicted the charter and is
    corrected here.
  - >-
    CL-001 evidence and source-intake lanes are packet evidence categories, not
    execution containers. They are owned by this repository's research contract
    and are never reconciled with this manifest.
  - >-
    No lane may be marked as the Audacious North Star. The charter places it
    above the lane structure and calls it a target, not a premise. Lane 1 is its
    primary operational expression through the Nearer Guiding Hypothesis.
